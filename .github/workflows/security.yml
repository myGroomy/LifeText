name: Security & Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit safety
    
    - name: Check for secrets with git-secrets
      run: |
        pip install detect-secrets
        detect-secrets scan --baseline .secrets.baseline || true
    
    - name: Security check with bandit
      run: |
        bandit -r src/ -f json -o bandit-report.json || true
        bandit -r src/ || true
    
    - name: Check dependencies for vulnerabilities
      run: |
        safety check --json || true
    
    - name: Check for hardcoded credentials
      run: |
        if grep -r "sk-" src/ tests/ --include="*.py" | grep -v ".example"; then
          echo "❌ WARNING: Possible hardcoded API keys found"
          exit 1
        fi
        if grep -r "password" src/ tests/ --include="*.py" -i | grep -v "# " | grep "="; then
          echo "❌ WARNING: Possible hardcoded passwords found"
          exit 1
        fi
        echo "✅ No obvious hardcoded credentials found"

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint black isort
    
    - name: Check code formatting with black
      run: |
        black --check src/ tests/ || true
    
    - name: Check import sorting with isort
      run: |
        isort --check-only src/ tests/ || true
    
    - name: Lint with pylint
      run: |
        pylint src/ --exit-zero --max-line-length=120 || true
