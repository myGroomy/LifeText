version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lifetext}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lifetext_dev_password_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-lifetext}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifetext}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://lifetext:lifetext_dev_password_change_in_prod@postgres:5432/lifetext}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - XDG_CACHE_HOME=/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - whisper_cache:/cache
      - uploaded_files:/tmp/lifetext
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: .
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://lifetext:lifetext_dev_password_change_in_prod@postgres:5432/lifetext}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - XDG_CACHE_HOME=/cache
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - whisper_cache:/cache
      - uploaded_files:/tmp/lifetext
    command: celery -A src.workers.celery_app worker --loglevel=info

volumes:
  postgres_data:
  redis_data:
  whisper_cache:
  uploaded_files:
